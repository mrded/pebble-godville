name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: rebble/pebble-sdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: pebble build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godville.pbw
          path: build/godville.pbw
