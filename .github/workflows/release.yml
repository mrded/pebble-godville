name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: rebble/pebble-sdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: pebble build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/godville.pbw
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
